<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISFT Instituti Manzillari</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #333;
        }

        /* Sarlavha */
        .header {
            background-color: #8b0000;
            color: #ffffff;
            text-align: center;
            padding: 25px 15px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        /* Kontent */
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .address-card {
            border: 2px solid #8b0000;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .address-title {
            font-size: 20px;
            font-weight: bold;
        }

        .location-btn {
            background-color: #8b0000;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            transition: 0.3s;
        }

        .location-btn:hover {
            background-color: #a30000;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }

            .address-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .location-btn {
                margin-top: 12px;
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Sarlavha -->
    <div class="header">
        <h1>ISFT Instituti Manzillari</h1>
    </div>

    <!-- Manzillar -->
    <div class="container">

        <!-- Asosiy bino -->
        <div class="address-card">
            <div class="address-title">Asosiy o‘quv binosi</div>
            <a href="https://yandex.uz/maps/-/CLtgYNi9"
               class="location-btn"
               target="_blank">
                Lokatsiya
            </a>
        </div>

        <!-- Eco-1 -->
        <div class="address-card">
            <div class="address-title">Eco-1 o‘quv binosi</div>
            <a href="https://yandex.uz/maps/-/CLtgYXnz"
               class="location-btn"
               target="_blank">
                Lokatsiya
            </a>
        </div>

        <!-- Eco-2 -->
        <div class="address-card">
            <div class="address-title">Eco-2 o‘quv binosi</div>
            <a href="https://yandex.uz/maps/-/CLtgYXnz"
               class="location-btn"
               target="_blank">
                Lokatsiya
            </a>
        </div>

        <!-- Havas -->
        <div class="address-card">
            <div class="address-title">Havas o‘quv binosi</div>
            <a href="https://yandex.uz/maps/-/CLtguDmd"
               class="location-btn"
               target="_blank">
                Lokatsiya
            </a>
        </div>

    </div>

</body>
</html>
